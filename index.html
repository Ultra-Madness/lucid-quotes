<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Lucid — a moment of clarity</title>
<meta name="description" content="Lucid serves you one beautiful quote at a time. Swipe for the next.">
<meta name="theme-color" content="#08080B">
<meta name="color-scheme" content="dark">

<!-- iOS standalone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lucid">
<link rel="apple-touch-icon" href="./icons/icon-192.png">

<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- ── Ambient background ─────────────────────────────────────────────── -->
<div class="aurora" aria-hidden="true">
  <span class="blob blob--1"></span>
  <span class="blob blob--2"></span>
  <span class="blob blob--3"></span>
  <span class="blob blob--4"></span>
</div>
<div class="grain" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>

<!-- ── App shell ──────────────────────────────────────────────────────── -->
<div class="app" id="app">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar__row">
      <button class="brand" id="brandBtn" type="button" aria-label="Lucid — home">
        <svg class="brand__mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="9.25" stroke="currentColor" stroke-width="1.3" opacity=".45"/>
          <circle cx="12" cy="12" r="4" fill="currentColor"/>
        </svg>
        <span class="brand__name">Lucid</span>
      </button>

      <div class="topbar__actions">
        <button class="icon-btn" id="favViewBtn" type="button" aria-label="Saved quotes">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20.5S3.8 15.4 3.8 9.6A4.6 4.6 0 0 1 12 6.8a4.6 4.6 0 0 1 8.2 2.8c0 5.8-8.2 10.9-8.2 10.9Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <span class="badge" id="favCount" hidden>0</span>
        </button>
      </div>
    </div>

    <!-- Category chips -->
    <div class="chips" id="chips" role="tablist" aria-label="Categories">
      <!-- injected -->
    </div>
  </header>

  <!-- Stage: the quote deck -->
  <main class="stage" id="stage">
    <article class="card" id="card" tabindex="0" aria-live="polite" aria-label="Quote card. Swipe up for the next quote.">
      <div class="card__sheen" aria-hidden="true"></div>

      <div class="card__head">
        <span class="pill" id="pill">
          <span class="pill__dot"></span>
          <span id="pillText">Inspiration</span>
        </span>
      </div>

      <div class="card__body" id="quoteBox">
        <svg class="quote-mark" viewBox="0 0 48 32" aria-hidden="true">
          <path d="M20 32V17.1C20 7.7 25.6 1.6 35.6 0l1.7 4.2c-5.4 1.6-8.4 5-8.6 9.6H36V32H20ZM0 32V17.1C0 7.7 5.6 1.6 15.6 0l1.7 4.2c-5.4 1.6-8.4 5-8.6 9.6H16V32H0Z" fill="currentColor"/>
        </svg>
        <blockquote class="quote" id="quoteText">Loading…</blockquote>
        <div class="rule" aria-hidden="true"></div>
        <cite class="author" id="quoteAuthor">—</cite>
      </div>

      <div class="card__foot">
        <button class="ghost-btn" id="favBtn" type="button" aria-pressed="false" aria-label="Save to favorites">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20.5S3.8 15.4 3.8 9.6A4.6 4.6 0 0 1 12 6.8a4.6 4.6 0 0 1 8.2 2.8c0 5.8-8.2 10.9-8.2 10.9Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <span>Save</span>
        </button>
        <button class="ghost-btn" id="copyBtn" type="button" aria-label="Copy quote">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M15 5.5A2.5 2.5 0 0 0 12.5 3h-6A3.5 3.5 0 0 0 3 6.5v6A2.5 2.5 0 0 0 5.5 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Copy</span>
        </button>
        <button class="ghost-btn" id="shareBtn" type="button" aria-label="Share as image">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5V3.8m0 0L8.2 7.6M12 3.8l3.8 3.8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 13v5.2a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Share</span>
        </button>
      </div>
    </article>

    <!-- Favorites drawer -->
    <section class="drawer" id="drawer" hidden aria-label="Saved quotes">
      <div class="drawer__head">
        <h2>Saved</h2>
        <button class="icon-btn icon-btn--sm" id="drawerClose" type="button" aria-label="Close saved quotes">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 7 10 10M17 7 7 17" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="drawer__list" id="drawerList"></div>
    </section>
  </main>

  <!-- Dock -->
  <nav class="dock" aria-label="Quote controls">
    <button class="dock-btn" id="todayBtn" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 2.8v2.4M12 18.8v2.4M2.8 12h2.4M18.8 12h2.4M5.5 5.5l1.7 1.7M16.8 16.8l1.7 1.7M18.5 5.5l-1.7 1.7M7.2 16.8l-1.7 1.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>Today</span>
    </button>

    <button class="shuffle" id="shuffleBtn" type="button" aria-label="New quote">
      <span class="shuffle__glow" aria-hidden="true"></span>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 7h3.2c1.6 0 2.5.8 3.4 2.1l4 6c.9 1.3 1.8 2.1 3.4 2.1h2.6M3.5 17h3.2c1.6 0 2.5-.8 3.4-2.1M14.1 9.1c.9-1.3 1.8-2.1 3.4-2.1h3.1" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="m17.8 4.4 2.8 2.6-2.8 2.6M17.8 14.4l2.8 2.6-2.8 2.6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <button class="dock-btn" id="favViewBtn2" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20.5S3.8 15.4 3.8 9.6A4.6 4.6 0 0 1 12 6.8a4.6 4.6 0 0 1 8.2 2.8c0 5.8-8.2 10.9-8.2 10.9Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      <span>Saved</span>
    </button>
  </nav>

  <p class="hint" id="hint">Swipe up for the next</p>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- Offscreen canvas for share cards -->
<canvas id="shareCanvas" width="1080" height="1350" hidden></canvas>

<script src="./quotes.js"></script>
<script src="./app.js"></script>
</body>
</html>
